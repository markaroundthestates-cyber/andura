# §33-H1 audit fix — Dependabot grouped updates pentru GitHub Actions supply
# chain hardening. Major-tag pin policy în workflow files relies on Dependabot
# to surface CVE patches + minor version bumps via PR. Daniel reviews + merges.
#
# Pre-Beta scale: weekly cadence sufficient. Post-Beta consider daily for
# critical-CVE response time reduction.
#
# Reference: 08-workflows/PROD_OPS_RUNBOOK.md §3 rollback, deploy.yml header §33-H1.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-actions)"
      include: "scope"

  # Audit 2026-06-10 (GITHUB F2): npm ecosystem was MISSING — JS dependency CVEs
  # only surfaced reactively via ci.yml's npm-audit gate. Weekly grouped PRs make
  # them proactive. Daniel reviews + merges; CI full suite gates every PR anyway.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # 2026-06-15: ignore MAJOR bumps of the Vite build toolchain. Vite 8 re-chunks
    # the bundle wholesale (main 288->200 kB, vendor-icons over budget) and
    # @vitejs/plugin-react 6 breaks vite.config loading — both need a real build
    # migration + deployed-PWA smoke (SW/vite-plugin-pwa, lazy routes). Low ROI on a
    # PWA being ported to RN/Expo. Minor/patch (incl. CVE) still flow. Un-ignore when
    # the build toolchain is intentionally upgraded.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

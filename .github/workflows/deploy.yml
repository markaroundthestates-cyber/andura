name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '04-architecture/mockups/**'
      - '00-index/**'
      - '01-vision/**'
      - '02-audit/**'
      - '03-decisions/**'
      - '05-findings-tracker/**'
      - '06-sessions-log/**'
      - '07-meta/**'
      - '08-workflows/**'
      - '📥_inbox/**'
      - '📤_outbox/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

name: Deploy to GitHub Pages

# ═══════════════════════════════════════════════════════════════════════
# §A033 audit fix (NC§34-C3) — ROLLBACK PROCEDURE
# ═══════════════════════════════════════════════════════════════════════
# Quick rollback dacă deploy production breaks:
#
# Option 1 — Revert last commit (FAST, recommended P0/P1):
#   git revert HEAD
#   git push origin main
#   → triggers fresh deploy of previous state (~3-5 min propagation)
#
# Option 2 — Revert specific commit by hash:
#   git revert <commit-hash>
#   git push origin main
#
# Option 3 — Hard reset main to last known good (LAST RESORT, requires
# force-push acceptance — Daniel manual decision; pierdes commits ulterioare):
#   git reset --hard <last-good-hash>
#   git push --force-with-lease origin main
#   → Daniel verify backup tag exists before force-push
#
# Option 4 — Manual emergency restore via gh-pages branch (when main blocked):
#   1. Pe gh-pages branch find last known good commit
#   2. Force-push gh-pages directly to that commit
#   3. Site recovers <1min (no rebuild needed)
#
# Verify post-rollback:
#   - `npm run healthcheck` → all 4 checks green
#   - Sentry dashboard → error rate dropped
#   - GitHub Actions → fresh deploy job succeeded
#   - Daniel manual smoke: Magic Link login + Antrenor home render
#
# Post-incident: write entry în 06-sessions-log/INCIDENT_<date>.md
# (cross-ref 08-workflows/PROD_OPS_RUNBOOK.md §2 decision tree).
# ═══════════════════════════════════════════════════════════════════════
#
# §33-H1 audit fix (action version pin policy) — Solo founder pragmatism:
# - All actions pinned to @v<major> tag (current latest verified 2026-05-22).
# - Supply chain hardening = Dependabot grouped updates (.github/dependabot.yml).
# - Full SHA-pin defer post-Beta (requires periodic SHA refresh ops; major-tag
#   + Dependabot covers known-CVE window pre-Beta scale).
# Decision: PROD_OPS_RUNBOOK §3 lists rollback options; major-tag + Dependabot
# trade-off documented for re-evaluation post-Beta at multi-developer scale.
#
# §33-H2 audit fix (rollback workflow_dispatch) — Manual `workflow_dispatch`
# trigger below supports inputs.ref for deploying any tag/SHA via Actions UI
# (Actions tab → "Deploy to GitHub Pages" → Run workflow → branch/tag/sha).
# Complements PROD_OPS_RUNBOOK §3 rollback procedures.
# ═══════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
    paths-ignore:
      - '04-architecture/mockups/**'
      - '00-index/**'
      - '01-vision/**'
      - '02-audit/**'
      - '03-decisions/**'
      - '05-findings-tracker/**'
      - '06-sessions-log/**'
      - '07-meta/**'
      - '08-workflows/**'
      - '📥_inbox/**'
      - '📤_outbox/**'
      - '**.md'
  # §33-H2 audit fix — workflow_dispatch with explicit ref input for rollback
  # to specific tag/SHA without git revert dance. Actions tab → Run workflow
  # → enter target ref (branch/tag/sha) → fresh deploy from that ref.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch/tag/sha; default = current branch HEAD)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

# Workflow-level env applies la deploy + lighthouse-live + checkly-deploy jobs.
env:
  # Skip husky `prepare` lifecycle script — bypasses /usr/bin/git exit 128.
  HUSKY: '0'
  # Force Node 24 internal runtime pentru JS-based actions (silence Node 20 warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # §33-H2 audit fix — checkout configurable ref. Push trigger uses default
      # (current branch HEAD); workflow_dispatch can pass explicit ref to deploy
      # any tag/SHA. Empty string falls back to default branch HEAD.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # §33-C1 + §20-H1 + §20-H2 audit fix — npm ci (deterministic from lockfile)
      # + typecheck + vitest gate BEFORE build/deploy. Production never ships
      # broken code. Pre-Beta launch hardening.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run test:run
      # iter 9.5 fix — VITE_FIREBASE_API_KEY + VITE_FIREBASE_RTDB_URL injected
      # at build time. Bundle production was shipping with 'PLACEHOLDER_WEB_API_KEY'
      # literal causing Magic Link 400 errors (anti-recurrence #2026-05-20 birou).
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_RTDB_URL: ${{ secrets.VITE_FIREBASE_RTDB_URL }}
          # §B005/D-2 audit fix — Google OAuth client ID (optional pre-Daniel-setup).
          # Build succeeds dacă secret missing; Auth.tsx hides Google button gracefully.
          # Daniel: configure Google Cloud Console OAuth client + Firebase Authentication
          # Sign-in providers → Google + add VITE_GOOGLE_OAUTH_CLIENT_ID GitHub Secret.
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}

      # Official GitHub Actions Pages deployment (build_type=workflow). Replaces
      # peaceiris/actions-gh-pages branch-push — this stops GitHub's managed
      # "pages build and deployment" workflow (Node 20, not editable by us) from
      # running, eliminating the Node 20 deprecation warning. Action versions
      # forced to Node 24 via FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env above.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v4

  # §33-H4 audit fix — post-deploy smoke health check against live andura.app.
  # Runs after gh-pages publish + propagation; curls root URL + verifies 200.
  # Fail = §33-H5 notify-on-failure triggers; Daniel manually rollbacks via §3
  # of PROD_OPS_RUNBOOK. Pre-Beta scale; post-Beta switch to scripts/healthcheck.cjs
  # (A032 PENDING) for richer multi-endpoint smoke.
  post-deploy-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub Pages propagation
        run: sleep 60
      - name: Smoke check andura.app root
        run: |
          STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" https://andura.app/ || echo "FAIL")
          echo "andura.app HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Post-deploy smoke FAIL — andura.app returned HTTP $STATUS (expected 200)"
            echo "::error::Investigate via PROD_OPS_RUNBOOK §3 rollback procedure"
            exit 1
          fi
          echo "Post-deploy smoke PASS — andura.app HTTP 200"

  # §33-H5 audit fix — deploy notification on failure (deploy job OR smoke fail).
  # Slack incoming webhook (DEPLOY_SLACK_WEBHOOK_URL secret optional; missing = skip).
  # Daniel solo founder = Slack DM channel pentru ops alerts; pre-Beta cost zero
  # (Slack free tier). Success notifications muted (Daniel manual andura.app
  # check post-push is faster); fail notifications loud.
  notify-on-failure:
    needs: [deploy, post-deploy-smoke]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Slack webhook notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "DEPLOY_SLACK_WEBHOOK_URL not configured — skipping Slack notify"
            echo "Daniel manual check via Actions tab + andura.app smoke"
            exit 0
          fi
          PAYLOAD=$(printf '{"text":":rotating_light: Andura deploy FAILED — run %s — investigate PROD_OPS_RUNBOOK §3 rollback"}' \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" \
            && echo "Slack notify sent" \
            || echo "Slack notify failed (non-blocking)"

  # Track 7 §7.6 — post-deploy Lighthouse against live andura.app
  # (gated on Daniel uploading LHCI_GITHUB_APP_TOKEN per
  # 📥_inbox/SETUP_DANIEL_TRACK_7.md §A.4)
  lighthouse-live:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Wait for GitHub Pages propagation
        run: sleep 45
      - name: Lighthouse CI live URL
        run: npx lhci autorun --collect.url=https://andura.app
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

  # Track 7 §7.7 + §7.6-activate — Checkly synthetic prod deploy refresh.
  # CHECKLY_API_KEY + CHECKLY_ACCOUNT_ID uploaded by Daniel + verified GREEN
  # per SETUP_VERIFICATION.md. Job-level if-condition removed since secrets
  # always present. continue-on-error preserved la step pentru robustness.
  checkly-deploy:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Checkly deploy (synthetic monitor refresh)
        run: npx checkly deploy --force
        env:
          CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
        continue-on-error: true

name: QA Report

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

permissions:
  contents: write
  statuses: write
  pull-requests: write
  issues: write

# Skip husky `prepare` lifecycle script — bypasses /usr/bin/git exit 128.
# Force Node 24 internal runtime pentru JS-based actions (silence Node 20 warnings).
env:
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Target the live deployed site (liveProdMode in playwright.config.js skips the
  # local preview webServer — no build needed; matches the propagation wait below).
  PLAYWRIGHT_BASE_URL: 'https://andura.app'

jobs:
  qa:
    runs-on: ubuntu-latest
    # Run regardless of deploy outcome so we always get a report, but skip if deploy itself was skipped
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages to propagate
        run: sleep 45

      - name: Run Playwright tests (functional live smoke — visual-regression excluded)
        id: playwright
        # Visual-regression is a local opt-in tool (npm run test:visual), NOT a CI
        # gate — it has no platform-matched baselines and pixel-diffs every
        # intentional design change. Exclude it from the blocking smoke.
        run: npx playwright test --grep-invert "Visual regression" --reporter=json,html,list 2>&1 | tee playwright-output.txt
        continue-on-error: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Parse results and post commit comment
        if: always()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const sha = context.payload.workflow_run.head_sha;

            // Read test output
            let output = '';
            try { output = fs.readFileSync('playwright-output.txt', 'utf8'); } catch {}

            // Parse pass/fail counts
            const passMatch = output.match(/(\d+) passed/);
            const failMatch = output.match(/(\d+) failed/);
            const passed = passMatch ? parseInt(passMatch[1]) : 0;
            const failed = failMatch ? parseInt(failMatch[1]) : 0;
            const total = passed + failed;

            // Extract failed test names
            const failedTests = [];
            const lines = output.split('\n');
            lines.forEach(line => {
              if (line.includes('✘') || line.includes('FAILED')) {
                failedTests.push(line.trim().replace(/^\d+\)\s*/, '').replace(/✘\s*\d+\s*/, ''));
              }
            });

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}`;
            const artifactUrl = `${runUrl}#artifacts`;

            // Zero-test guard: a run that parsed 0 passed + 0 failed means the
            // Playwright run itself crashed (config error, no browser, all
            // skipped) — the old code posted GREEN on this. Treat it as a hard
            // FAILURE so a broken smoke can never look like a passing one.
            const zeroTests = total === 0;

            let body = '';
            if (zeroTests) {
              body = `## ❌ QA Automat — Zero teste rulate\n\n` +
                `**🔴 CRITIC** — rularea Playwright a produs **0 teste** (passed + failed = 0). ` +
                `Run-ul a esuat sa porneasca, sau toate testele au fost skip-uite.\n\n` +
                `📊 [Raport HTML complet](${artifactUrl}) | 🔗 [Run CI](${runUrl})`;
            } else if (failed === 0) {
              body = `## ✅ QA Automat — Toate testele trec\n\n` +
                `**${passed}/${total} teste au trecut** în ${new Date().toLocaleTimeString('ro-RO')}.\n\n` +
                `📊 [Raport HTML complet](${artifactUrl})`;
            } else {
              const urgency = failed >= 3 ? '🔴 CRITIC' : failed === 2 ? '🟠 IMPORTANT' : '🟡 ATENȚIE';
              body = `## ❌ QA Automat — ${failed} test(e) picate\n\n` +
                `**${urgency}** — ${failed} din ${total} teste au eșuat.\n\n` +
                `### Teste picate:\n` +
                failedTests.map(t => `- \`${t}\``).join('\n') + '\n\n' +
                `### Ce înseamnă:\n`;

              if (output.includes('ReferenceError') || output.includes('TypeError')) {
                body += `- ⚠️ Eroare JS critică în aplicație — verifică consola\n`;
              }
              if (output.includes('intercepts pointer events')) {
                body += `- ⚠️ Un element blochează interacțiunile UI (modal fullscreen?)\n`;
              }
              if (output.includes('400') && output.includes('fonts')) {
                body += `- ⚠️ Fonturile Google nu se încarcă — verifică URL-ul în themes.js\n`;
              }
              if (output.includes('max-width') || output.includes('430')) {
                body += `- ⚠️ Container prea lat pe desktop — verifică CSS max-width\n`;
              }

              body += `\n### Urgență: ${urgency}\n`;
              if (failed >= 3) {
                body += `Aplicația poate fi nefuncțională pentru utilizatori. Repară ACUM.\n`;
              } else {
                body += `Feature-uri minore afectate. Repară înainte de următorul push.\n`;
              }

              body += `\n📊 [Raport HTML complet](${artifactUrl}) | 🔗 [Run CI](${runUrl})`;
            }

            // A run is healthy ONLY when at least one test ran AND none failed.
            const ok = !zeroTests && failed === 0;

            // Post as commit status
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: ok ? 'success' : 'failure',
              description: zeroTests
                ? 'Zero teste rulate — Playwright a esuat'
                : ok ? `Toate ${total} teste trec` : `${failed}/${total} teste picate`,
              context: 'QA / Playwright',
              target_url: runUrl,
            });

            // Post commit comment only on failure (failed tests OR zero-test run)
            if (!ok) {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
                body,
              });
            }

            // Fail the job on a failed test OR a zero-test (broken) run
            if (zeroTests) {
              core.setFailed('QA produced zero tests — playwright run likely failed or all skipped');
            } else if (failed > 0) {
              core.setFailed(`${failed} test(e) picate`);
            }

# Track 7 §7.6 + §7.8 — nightly cron workflows
# Stryker mutation testing engine + Stagehand exploration monitoring.
# Per master spec §5 deploy.yml verbatim test-mutation-nightly + nightly-exploration jobs.

name: Track 7 Nightly Quality Monitor

on:
  schedule:
    # Daily 03:00 UTC = 06:00 EEST (Romania morning Daniel review)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # Stagehand creates GitHub Issues pe anomaly detection

# Workflow-level env applies la stryker-mutation-engine + stagehand-exploration.
env:
  # Skip husky `prepare` lifecycle script — bypasses /usr/bin/git exit 128.
  HUSKY: '0'
  # Force Node 24 internal runtime pentru JS-based actions (silence Node 20 warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Track 7 §7.6 — Stryker mutation testing engine fast-check verification
  # Gates mutation score ≥75% per master spec §1.7 (currently informative-only;
  # ratchet to error gate post first clean baseline).
  stryker-mutation-engine:
    name: Stryker Mutation Engine
    runs-on: ubuntu-latest
    # 60→180 (2026-06-12): the dry-run timeout fix (engine-only vitest config)
    # lets Stryker actually reach the ~61k engine mutants now — give the full
    # mutate pass headroom on the 2-vCPU runner. Nightly/off-hours, well under
    # the 360-min GH ceiling. A real crash still goes red (no continue-on-error).
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # NO continue-on-error (false-green audit 2026-06-12): a Stryker CRASH
      # (config/parse/infra — e.g. the .d.ts BABEL_PARSE_ERROR that ran silent-
      # green for weeks) must paint the job RED. The mutation SCORE itself stays
      # informative-only (no thresholds.break) — red here means "the monitor is
      # broken", not "the score dipped".
      - name: Run Stryker mutation engine subset
        run: npm run mutation:engine
      - name: Upload Stryker HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-mutation-report
          path: reports/mutation/
          retention-days: 30

  # Track 7 §7.8 — Stagehand exploration nightly monitoring scope
  # (NU gating per WebTestBench arXiv 2603.25226 — exploration scope only)
  # Step-level secrets check via env+shell (job-level `if: secrets.X != ''`
  # antipattern în step-level invalid GitHub Actions per docs; per Daniel
  # iter 8 same fix ca iter 1 verify workflow). Job always runs; activation
  # gated by shell check pe BROWSERBASE_API_KEY + ANTHROPIC_API_KEY.
  stagehand-exploration:
    name: Stagehand Persona Exploration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: 'Check secrets gating (env+shell pattern, NOT if: secrets.X)'
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$BROWSERBASE_API_KEY" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ BROWSERBASE_API_KEY or ANTHROPIC_API_KEY not set — skipping exploration job"
            echo "SKIP_EXPLORATION=1" >> $GITHUB_ENV
          else
            echo "✅ Secrets present — exploration job will run"
          fi
      - run: npm ci --ignore-scripts
        if: env.SKIP_EXPLORATION != '1'
      - name: Run Stagehand persona exploration
        if: env.SKIP_EXPLORATION != '1'
        run: npm run exploration
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GITHUB_TOKEN auto-provided by Actions runner pentru issue create
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

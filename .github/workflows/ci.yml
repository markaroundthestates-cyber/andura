name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '04-architecture/mockups/**'
      - '00-index/**'
      - '01-vision/**'
      - '02-audit/**'
      - '03-decisions/**'
      - '05-findings-tracker/**'
      - '06-sessions-log/**'
      - '07-meta/**'
      - '08-workflows/**'
      - '📥_inbox/**'
      - '📤_outbox/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '04-architecture/mockups/**'
      - '00-index/**'
      - '01-vision/**'
      - '02-audit/**'
      - '03-decisions/**'
      - '05-findings-tracker/**'
      - '06-sessions-log/**'
      - '07-meta/**'
      - '08-workflows/**'
      - '📥_inbox/**'
      - '📤_outbox/**'
      - '**.md'
  workflow_dispatch:
  schedule:
    # Weekly cron Monday 06:00 UTC pentru e2e-smoke safety net
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (typecheck + unit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Unit Tests (vitest)
        run: npm run test:run

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: validate
    # Run only on manual dispatch OR weekly cron — NU pe push/PR (cost optimization)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npx playwright test tests/e2e/smoke --reporter=line
        timeout-minutes: 10

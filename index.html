  <!-- §15-N2 audit fix (NIT chat 5 Wave 22) — iOS Safari PWA hints. Without
       these, "Add to Home Screen" on iPhone opens app in regular Safari shell
       (URL bar + bottom toolbar visible) instead of standalone PWA mode.
       'apple-mobile-web-app-capable' enables standalone display on iOS,
       'apple-mobile-web-app-status-bar-style=default' surfaces light status
       bar matching cream paper background (#faf7f1). Maria 65 iPhone install
       flow now matches Android Add-to-Home parity. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Andura" />

  <!-- SPA GitHub Pages redirect decode (Rafael Pedicini pattern spa-github-pages).
       Pereche cu public/404.html: 404.html encode URL → query string,
       acest script decode + history.replaceState înainte React Router mount.
       Critical pentru Magic Link callback /auth-callback?oobCode=XXX (Firebase). -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>

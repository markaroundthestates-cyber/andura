<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c8412e" />
  <meta name="description" content="Andura - coach AI personal pentru sala, facut in Romania. Antrenament cu cap." />
  <meta name="color-scheme" content="light" />
  <!-- §4-C3 + §4-C4 + §4-C27/28/29 + §4-C17/23 audit fix: defense-in-depth headers.
       GH Pages has no custom HTTP headers → meta http-equiv where applicable.
       'unsafe-inline' tolerated initial (Tailwind injects style) — Track 7 nonce migration. -->
  <!-- Note: 'frame-ancestors' + X-Frame-Options are intentionally omitted — both
       directives are ignored when delivered via <meta> (browsers log console errors).
       True clickjacking protection requires HTTP headers, which GH Pages cannot set.
       Accepted-risk pre-Beta; revisit when migrating to a host that supports custom headers. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.sentry.io https://o4511269200068608.ingest.de.sentry.io; base-uri 'self'; form-action 'self'" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- PWA manifest auto-injected by vite-plugin-pwa as /manifest.webmanifest.
       Single SoT: vite.config.js `VitePWA({manifest:...})`. -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <!-- §36-M3 audit fix — DNS prefetch hints for Firebase + Sentry endpoints.
       Shaves initial connect time on first auth + telemetry calls (~50-100ms
       on cold cache). Google Fonts preconnect removed post self-host (2026-05-23). -->
  <link rel="dns-prefetch" href="//fittracker-c34e8-default-rtdb.europe-west1.firebasedatabase.app" />
  <link rel="dns-prefetch" href="//identitytoolkit.googleapis.com" />
  <link rel="dns-prefetch" href="//securetoken.googleapis.com" />
  <link rel="dns-prefetch" href="//o4511269200068608.ingest.de.sentry.io" />
  <!-- Self-host Inter Variable Latin subset @font-face declared in
       src/styles/global.css (font-display: swap). Bundled via Vite from
       @fontsource-variable/inter (Latin slice ~48 KB). Preload omis post
       chat 5 FONT_SUBSET_LATIN_FIX — hash dynamic + global.css critical
       CSS path already discovers @font-face declaration pre-paint. -->
  <title>Andura</title>
  <!-- SPA GitHub Pages redirect decode (Rafael Pedicini pattern spa-github-pages).
       Pereche cu public/404.html: 404.html encode URL → query string,
       acest script decode + history.replaceState înainte React Router mount.
       Critical pentru Magic Link callback /auth-callback?oobCode=XXX (Firebase). -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <style>
    /* §1-C1 audit fix: replace dark FOUC inline with cream warm light shell
       matching Tailwind --paper token. App-level CSS hydrates via main.tsx. */
    html, body {
      margin: 0;
      padding: 0;
      background: #faf7f1;
      color: #1a1815;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }
    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
